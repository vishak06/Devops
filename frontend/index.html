<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Daily Expense Tracker — Track your income and expenses with a clean, modern interface.">
    <title>Daily Expense Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- Animated background orbs -->
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <div class="container">
        <!-- Header -->
        <header class="header" id="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">💰</span>
                    <h1>Daily Expense Tracker</h1>
                </div>
                <p class="tagline">Take control of your finances</p>
            </div>
        </header>

        <!-- Balance Cards -->
        <section class="balance-section" id="balance-section">
            <div class="balance-card balance-card--income" id="income-card">
                <div class="balance-card__icon">📈</div>
                <div class="balance-card__info">
                    <span class="balance-card__label">Total Income</span>
                    <span class="balance-card__amount" id="total-income">₹0.00</span>
                </div>
            </div>
            <div class="balance-card balance-card--expense" id="expense-card">
                <div class="balance-card__icon">📉</div>
                <div class="balance-card__info">
                    <span class="balance-card__label">Total Expense</span>
                    <span class="balance-card__amount" id="total-expense">₹0.00</span>
                </div>
            </div>
            <div class="balance-card balance-card--balance" id="balance-card">
                <div class="balance-card__icon">💎</div>
                <div class="balance-card__info">
                    <span class="balance-card__label">Net Balance</span>
                    <span class="balance-card__amount" id="net-balance">₹0.00</span>
                </div>
            </div>
        </section>

        <!-- Add Transaction Form -->
        <section class="form-section glass-card" id="form-section">
            <h2 class="section-title">Add Transaction</h2>
            <form id="transaction-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="amount">Amount (₹)</label>
                        <input type="number" id="amount" name="amount" placeholder="0.00" step="0.01" min="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="transaction-type">Type</label>
                        <select id="transaction-type" name="transaction_type" required>
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" name="category" required>
                            <option value="food">🍔 Food</option>
                            <option value="travel">✈️ Travel</option>
                            <option value="bills">🧾 Bills</option>
                            <option value="salary">💼 Salary</option>
                            <option value="entertainment">🎮 Entertainment</option>
                            <option value="shopping">🛒 Shopping</option>
                            <option value="health">🏥 Health</option>
                            <option value="other">📦 Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                    <div class="form-group form-group--full">
                        <label for="description">Description (optional)</label>
                        <input type="text" id="description" name="description" placeholder="e.g., Lunch at cafe">
                    </div>
                </div>
                <button type="submit" class="btn btn--primary" id="submit-btn">
                    <span class="btn__text">Add Transaction</span>
                    <span class="btn__icon">+</span>
                </button>
            </form>
            <div id="form-message" class="form-message"></div>
        </section>

        <!-- Transaction History -->
        <section class="history-section glass-card" id="history-section">
            <div class="history-header">
                <h2 class="section-title">Transaction History</h2>
                <div class="filter-group">
                    <label for="filter-category">Filter:</label>
                    <select id="filter-category">
                        <option value="">All Categories</option>
                        <option value="food">🍔 Food</option>
                        <option value="travel">✈️ Travel</option>
                        <option value="bills">🧾 Bills</option>
                        <option value="salary">💼 Salary</option>
                        <option value="entertainment">🎮 Entertainment</option>
                        <option value="shopping">🛒 Shopping</option>
                        <option value="health">🏥 Health</option>
                        <option value="other">📦 Other</option>
                    </select>
                </div>
            </div>
            <div class="table-wrapper">
                <table id="transactions-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Type</th>
                            <th>Category</th>
                            <th>Description</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody id="transactions-body">
                        <tr class="empty-row">
                            <td colspan="5">No transactions yet. Add one above!</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>Daily Expense Tracker &copy; 2026 — Built with Django & ❤️</p>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
